appId: com.anyboot.app
productName: AnyBoot
directories:
  output: release
files:
  - dist/**/*
  - resources/**/*
extraResources:
  - from: resources/
    to: resources/
win:
  target:
    - nsis
  signAndEditExecutable: false
  forceCodeSigning: false
linux:
  target:
    - AppImage
    - deb
  category: Utility
