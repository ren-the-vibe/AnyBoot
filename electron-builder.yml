appId: com.anyboot.app
productName: AnyBoot
directories:
  output: release
files:
  - dist/**/*
  - resources/**/*
extraResources:
  - from: resources/
    to: resources/
win:
  target:
    - nsis
    - portable
  icon: AnyBoot.png
  forceCodeSigning: false
  signtoolOptions:
    sign: scripts/sign.js
linux:
  target:
    - AppImage
    - deb
  icon: AnyBoot.png
  category: Utility
mac:
  icon: AnyBoot.png
