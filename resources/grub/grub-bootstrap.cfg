# Bootstrap config for Secure Boot signed GRUB.
# The signed GRUB binary has /EFI/ubuntu as its hardcoded prefix,
# so it loads this file from {ESP}/EFI/ubuntu/grub.cfg.
#
# No insmod needed here — the signed GRUB binary has ntfs, search,
# configfile, etc. built in. Using insmod under Secure Boot lockdown
# would trigger "prohibited by secure boot policy" errors.
search --no-floppy --label BOOTANY --set=root
set prefix=($root)/boot/grub
configfile $prefix/grub.cfg
