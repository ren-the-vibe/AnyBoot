# AnyBoot GRUB2 Configuration
# Dynamic multiboot ISO menu — scans /iso/ and subfolders

set timeout=30
set default=0
set pager=1

# Load required modules
insmod all_video
insmod loopback
insmod iso9660
insmod fat
insmod part_gpt
insmod part_msdos
insmod regexp

# Find the ANYBOOT data partition
search --no-floppy --label ANYBOOT --set=root

# Set colors
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "AnyBoot - Multiboot USB" --unrestricted {
    echo "Select an ISO below to boot from."
}

# --- Top-level ISOs (/iso/*.iso) ---
for isofile in /iso/*.iso /iso/*.ISO; do
    if [ -f "$isofile" ]; then
        regexp --set=isoname '/iso/(.*)' "$isofile"

        menuentry "Boot: ${isoname}" "$isofile" {
            set isofile="${2}"
            echo "Loading ${isofile}..."
            loopback loop "$isofile"

            # Ubuntu / Linux Mint / elementary OS (casper-based)
            if [ -f (loop)/casper/vmlinuz ]; then
                linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile noprompt noeject quiet splash
                if [ -f (loop)/casper/initrd ]; then
                    initrd (loop)/casper/initrd
                elif [ -f (loop)/casper/initrd.lz ]; then
                    initrd (loop)/casper/initrd.lz
                elif [ -f (loop)/casper/initrd.gz ]; then
                    initrd (loop)/casper/initrd.gz
                fi

            # Debian / Kali / Tails (live-based)
            elif [ -f (loop)/live/vmlinuz ]; then
                linux (loop)/live/vmlinuz boot=live findiso=$isofile noprompt noeject quiet splash
                if [ -f (loop)/live/initrd.img ]; then
                    initrd (loop)/live/initrd.img
                elif [ -f (loop)/live/initrd ]; then
                    initrd (loop)/live/initrd
                fi

            # Fedora / RHEL / CentOS
            elif [ -f (loop)/isolinux/vmlinuz ]; then
                linux (loop)/isolinux/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
                if [ -f (loop)/isolinux/initrd.img ]; then
                    initrd (loop)/isolinux/initrd.img
                elif [ -f (loop)/isolinux/initrd ]; then
                    initrd (loop)/isolinux/initrd
                fi

            # Fedora (newer layout with images/pxeboot)
            elif [ -f (loop)/images/pxeboot/vmlinuz ]; then
                linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
                initrd (loop)/images/pxeboot/initrd.img

            # Arch Linux
            elif [ -f (loop)/arch/boot/x86_64/vmlinuz-linux ]; then
                linux (loop)/arch/boot/x86_64/vmlinuz-linux img_dev=/dev/disk/by-label/ANYBOOT img_loop=$isofile earlymodules=loop
                initrd (loop)/arch/boot/x86_64/initramfs-linux.img

            # openSUSE
            elif [ -f (loop)/boot/x86_64/loader/linux ]; then
                linux (loop)/boot/x86_64/loader/linux iso-scan/filename=$isofile splash=silent quiet
                initrd (loop)/boot/x86_64/loader/initrd

            # Generic fallback (vmlinuz in /boot)
            elif [ -f (loop)/boot/vmlinuz ]; then
                linux (loop)/boot/vmlinuz iso-scan/filename=$isofile quiet
                if [ -f (loop)/boot/initrd.img ]; then
                    initrd (loop)/boot/initrd.img
                elif [ -f (loop)/boot/initrd ]; then
                    initrd (loop)/boot/initrd
                fi
            else
                echo "Could not find kernel in ${isofile}"
                echo "This ISO may not support loopback booting."
                echo "Press any key to return to menu..."
                read
            fi
        }
    fi
done

# --- Subfolder ISOs, one level deep (/iso/<folder>/*.iso) ---
for isofile in /iso/*/*.iso /iso/*/*.ISO; do
    if [ -f "$isofile" ]; then
        regexp --set=foldername '/iso/([^/]+)/' "$isofile"
        regexp --set=isoname '/iso/[^/]+/(.*)' "$isofile"

        menuentry "[${foldername}] ${isoname}" "$isofile" {
            set isofile="${2}"
            echo "Loading ${isofile}..."
            loopback loop "$isofile"

            if [ -f (loop)/casper/vmlinuz ]; then
                linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile noprompt noeject quiet splash
                if [ -f (loop)/casper/initrd ]; then
                    initrd (loop)/casper/initrd
                elif [ -f (loop)/casper/initrd.lz ]; then
                    initrd (loop)/casper/initrd.lz
                elif [ -f (loop)/casper/initrd.gz ]; then
                    initrd (loop)/casper/initrd.gz
                fi
            elif [ -f (loop)/live/vmlinuz ]; then
                linux (loop)/live/vmlinuz boot=live findiso=$isofile noprompt noeject quiet splash
                if [ -f (loop)/live/initrd.img ]; then
                    initrd (loop)/live/initrd.img
                elif [ -f (loop)/live/initrd ]; then
                    initrd (loop)/live/initrd
                fi
            elif [ -f (loop)/isolinux/vmlinuz ]; then
                linux (loop)/isolinux/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
                if [ -f (loop)/isolinux/initrd.img ]; then
                    initrd (loop)/isolinux/initrd.img
                elif [ -f (loop)/isolinux/initrd ]; then
                    initrd (loop)/isolinux/initrd
                fi
            elif [ -f (loop)/images/pxeboot/vmlinuz ]; then
                linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
                initrd (loop)/images/pxeboot/initrd.img
            elif [ -f (loop)/arch/boot/x86_64/vmlinuz-linux ]; then
                linux (loop)/arch/boot/x86_64/vmlinuz-linux img_dev=/dev/disk/by-label/ANYBOOT img_loop=$isofile earlymodules=loop
                initrd (loop)/arch/boot/x86_64/initramfs-linux.img
            elif [ -f (loop)/boot/x86_64/loader/linux ]; then
                linux (loop)/boot/x86_64/loader/linux iso-scan/filename=$isofile splash=silent quiet
                initrd (loop)/boot/x86_64/loader/initrd
            elif [ -f (loop)/boot/vmlinuz ]; then
                linux (loop)/boot/vmlinuz iso-scan/filename=$isofile quiet
                if [ -f (loop)/boot/initrd.img ]; then
                    initrd (loop)/boot/initrd.img
                elif [ -f (loop)/boot/initrd ]; then
                    initrd (loop)/boot/initrd
                fi
            else
                echo "Could not find kernel in ${isofile}"
                echo "This ISO may not support loopback booting."
                echo "Press any key to return to menu..."
                read
            fi
        }
    fi
done

# --- Subfolder ISOs, two levels deep (/iso/<folder>/<subfolder>/*.iso) ---
for isofile in /iso/*/*/*.iso /iso/*/*/*.ISO; do
    if [ -f "$isofile" ]; then
        regexp --set=path '/iso/([^/]+/[^/]+)/' "$isofile"
        regexp --set=isoname '/iso/[^/]+/[^/]+/(.*)' "$isofile"

        menuentry "[${path}] ${isoname}" "$isofile" {
            set isofile="${2}"
            echo "Loading ${isofile}..."
            loopback loop "$isofile"

            if [ -f (loop)/casper/vmlinuz ]; then
                linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile noprompt noeject quiet splash
                if [ -f (loop)/casper/initrd ]; then
                    initrd (loop)/casper/initrd
                elif [ -f (loop)/casper/initrd.lz ]; then
                    initrd (loop)/casper/initrd.lz
                elif [ -f (loop)/casper/initrd.gz ]; then
                    initrd (loop)/casper/initrd.gz
                fi
            elif [ -f (loop)/live/vmlinuz ]; then
                linux (loop)/live/vmlinuz boot=live findiso=$isofile noprompt noeject quiet splash
                if [ -f (loop)/live/initrd.img ]; then
                    initrd (loop)/live/initrd.img
                elif [ -f (loop)/live/initrd ]; then
                    initrd (loop)/live/initrd
                fi
            elif [ -f (loop)/isolinux/vmlinuz ]; then
                linux (loop)/isolinux/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
                if [ -f (loop)/isolinux/initrd.img ]; then
                    initrd (loop)/isolinux/initrd.img
                elif [ -f (loop)/isolinux/initrd ]; then
                    initrd (loop)/isolinux/initrd
                fi
            elif [ -f (loop)/images/pxeboot/vmlinuz ]; then
                linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$isofile rd.live.image quiet
                initrd (loop)/images/pxeboot/initrd.img
            elif [ -f (loop)/arch/boot/x86_64/vmlinuz-linux ]; then
                linux (loop)/arch/boot/x86_64/vmlinuz-linux img_dev=/dev/disk/by-label/ANYBOOT img_loop=$isofile earlymodules=loop
                initrd (loop)/arch/boot/x86_64/initramfs-linux.img
            elif [ -f (loop)/boot/x86_64/loader/linux ]; then
                linux (loop)/boot/x86_64/loader/linux iso-scan/filename=$isofile splash=silent quiet
                initrd (loop)/boot/x86_64/loader/initrd
            elif [ -f (loop)/boot/vmlinuz ]; then
                linux (loop)/boot/vmlinuz iso-scan/filename=$isofile quiet
                if [ -f (loop)/boot/initrd.img ]; then
                    initrd (loop)/boot/initrd.img
                elif [ -f (loop)/boot/initrd ]; then
                    initrd (loop)/boot/initrd
                fi
            else
                echo "Could not find kernel in ${isofile}"
                echo "This ISO may not support loopback booting."
                echo "Press any key to return to menu..."
                read
            fi
        }
    fi
done

menuentry "---" --unrestricted { true }
menuentry "Reboot" { reboot }
menuentry "Shutdown" { halt }
